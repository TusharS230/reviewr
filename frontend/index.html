<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reviewr — Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <script>
      // Apply theme before render to prevent flash
      (function() {
        var t = localStorage.getItem('reviewr_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>

    <!-- Sidebar overlay (mobile) -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar__left">
        <button class="navbar__hamburger" id="hamburger-btn" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
        <div class="navbar__brand">Reviewr</div>
      </div>
      <div class="navbar__right">
        <button class="btn-theme" id="theme-toggle-btn" aria-label="Toggle theme"></button>
        <div class="navbar__actions" id="navbar-actions"></div>
      </div>
    </nav>

    <!-- Main layout -->
    <div class="l-container">

      <!-- Sidebar -->
      <aside class="sidebar">
        <ul>
          <li class="sidebar__item sidebar__item--active" id="nav-all-snippets">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5"/>
            </svg>
            All Snippets
          </li>
          <li class="sidebar__item" id="nav-my-reviews">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"/>
            </svg>
            My Reviews
          </li>
          <div class="sidebar__divider"></div>
          <li class="sidebar__item" id="nav-add-btn">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
            </svg>
            Add Snippet
          </li>
          <li class="sidebar__item" id="nav-settings">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
            </svg>
            Settings
          </li>
        </ul>
      </aside>

      <!-- Content -->
      <main class="l-content">
        <header class="l-content__header">
          <h1 id="page-title">Community Snippets</h1>
          <p id="page-subtitle">Browse and review code shared by other developers.</p>
        </header>
        <div id="snippets-grid" class="l-grid"></div>
      </main>

    </div>

    <!-- Add Snippet Modal -->
    <div id="add-modal" class="modal u-hidden">
      <div class="modal__box">
        <div class="modal__header">
          <span class="modal__title">New Snippet</span>
          <button class="modal__close" id="close-add-modal" aria-label="Close">&times;</button>
        </div>
        <div class="modal__body">
          <form id="add-snippet-form">
            <div class="form-group">
              <label class="form-label" for="input-title">Title</label>
              <input class="form-control" type="text" id="input-title" required placeholder="e.g. Binary Search in Java" />
            </div>
            <div class="form-group">
              <label class="form-label" for="input-language">Language</label>
              <select class="form-control" id="input-language" required>
                <option value="Java">Java</option>
                <option value="JavaScript">JavaScript</option>
                <option value="Python">Python</option>
                <option value="C++">C++</option>
                <option value="SQL">SQL</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="input-content">Code</label>
              <textarea class="form-control form-control--mono" id="input-content" rows="8" required placeholder="Paste your code here..."></textarea>
            </div>
            <div class="form-group">
              <button type="submit" class="btn btn--primary btn--full">Save Snippet</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Reviews Modal -->
    <div id="reviews-modal" class="modal u-hidden">
      <div class="modal__box">
        <div class="modal__header">
          <span class="modal__title">Reviews</span>
          <button class="modal__close" id="close-reviews-modal" aria-label="Close">&times;</button>
        </div>
        <div class="modal__body">
          <p class="modal__section-title">Leave a Review</p>
          <form id="add-review-form">
            <input type="hidden" id="review-snippet-id" />
            <div class="form-group">
              <label class="form-label" for="review-rating">Rating</label>
              <select class="form-control" id="review-rating" required>
                <option value="5">5 — Excellent</option>
                <option value="4">4 — Good</option>
                <option value="3">3 — Average</option>
                <option value="2">2 — Poor</option>
                <option value="1">1 — Bad</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="review-comment">Comment</label>
              <textarea class="form-control" id="review-comment" rows="3" required placeholder="Share your thoughts on this snippet..."></textarea>
            </div>
            <div class="form-group">
              <button type="submit" class="btn btn--primary btn--full">Submit Review</button>
            </div>
          </form>
          <div class="modal__divider"></div>
          <p class="modal__section-title">All Reviews</p>
          <div id="reviews-container"></div>
        </div>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal u-hidden">
      <div class="modal__box">
        <div class="modal__header">
          <span class="modal__title">Settings</span>
          <button class="modal__close" id="close-settings-modal" aria-label="Close">&times;</button>
        </div>
        <div class="modal__body">
          <p class="modal__section-title">Change Password</p>
          <form id="change-password-form">
            <div class="form-group">
              <label class="form-label" for="current-password">Current Password</label>
              <div class="pw-field">
                <input class="form-control" type="password" id="current-password" required placeholder="Enter current password" autocomplete="current-password" />
                <button type="button" class="pw-toggle" aria-label="Toggle password visibility"></button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="new-password">New Password</label>
              <div class="pw-field">
                <input class="form-control" type="password" id="new-password" required placeholder="Enter new password" autocomplete="new-password" />
                <button type="button" class="pw-toggle" aria-label="Toggle password visibility"></button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="confirm-password">Confirm New Password</label>
              <div class="pw-field">
                <input class="form-control" type="password" id="confirm-password" required placeholder="Confirm new password" autocomplete="new-password" />
                <button type="button" class="pw-toggle" aria-label="Toggle password visibility"></button>
              </div>
            </div>
            <p id="settings-message" class="settings-msg"></p>
            <div class="form-group">
              <button type="submit" class="btn btn--primary btn--full">Update Password</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Code Viewer Modal -->
    <div id="code-modal" class="modal u-hidden">
      <div class="modal__box modal__box--wide">
        <div class="modal__header">
          <div class="modal__header-left">
            <span class="modal__title" id="code-modal-title"></span>
            <span class="badge badge--lang" id="code-modal-lang"></span>
          </div>
          <div class="modal__header-right">
            <button class="btn btn--ghost" id="code-copy-btn">Copy</button>
            <button class="modal__close" id="close-code-modal" aria-label="Close">&times;</button>
          </div>
        </div>
        <div class="modal__body modal__body--code">
          <pre id="code-modal-content" class="code-viewer"></pre>
        </div>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
